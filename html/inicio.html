<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>

    <div class="wrapper">
        <div class="header-container">
            <div class="container-init">
                <ul class="container-menu">
                    <li class="active"><a href="#">Inicio</a></li>
                    <li class="dropdown"><a href="#">Pokedex</a>
                            <ul class="submenu">
                                <li><a href="#">Tipos</a></li>
                                <li><a href="#">Habilidades</a></li>
                                
                            </ul>
                        </li>
                    <li><a href="#">Regiones</a></li>
                    <li><a href="#">Objetos</a></li>

                </ul>
                

            </div>
            <div class="header-bottom">
                    <div class="search-container">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" placeholder="Buscar Pokémon, tipo o habilidad...">
                    </div>
                </div>
        </div>

        <main>

        <div class="pokedex-grid">
  
            <div class="pokemon-card">
                <div class="image-circle"><img src="bulbasaur.png" alt="Bulbasaur"></div>
                <div class="card-content">
                    <div class="pokemon-id">#001</div>
                    <div class="pokemon-name">Bulbasaur</div>
                    <div class="pokemon-type">Tipo: <span class="type grass">planta</span></div>
                </div>
            </div>

            <div class="pokemon-card">
                <div class="image-circle"><img src="ivysaur.png" alt="Ivysaur"></div>
                <div class="card-content">
                    <div class="pokemon-id">#002</div>
                    <div class="pokemon-name">Ivysaur</div>
                    <div class="pokemon-type">Tipo: <span class="type grass">planta</span></div>
                </div>
            </div>

            <div class="pokemon-card">
                <div class="image-circle"><img src="charmander.png" alt="Charmander"></div>
                <div class="card-content">
                    <div class="pokemon-id">#004</div>
                    <div class="pokemon-name">Charmander</div>
                    <div class="pokemon-type">Tipo: <span class="type fire">fuego</span></div>
                </div>
            </div>

            <div class="pokemon-card">
                <div class="image-circle"><img src="charmander.png" alt="Charmander"></div>
                <div class="card-content">
                    <div class="pokemon-id">#004</div>
                    <div class="pokemon-name">Charmander</div>
                    <div class="pokemon-type">Tipo: <span class="type fire">fuego</span></div>
                </div>
            </div>

            
        </div>
        <div class="pagination-container">
                <button class="page-prev"> &laquo; Anterior

                </button>
                <div class="page-numbers">
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <span class="page-dots">...</span>
                    <button class="page-btn">10</button>
                </div>
                <button class="page-next"> Siguiente &raquo;

                </button>

        </div>
  

        </main>

    <footer class="footer-container">
        <div class="footer-pok">2026 Pokeweb. Todos los derechos reservados. </div>

    </footer>

    </div>


    
    
</body>
</html>
